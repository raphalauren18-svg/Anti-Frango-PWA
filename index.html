<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Anti-Frango - A marca de treino feita por atletas comuns. Roupas fitness de alta performance.">
  <meta name="theme-color" content="#FF6A00">
  <meta name="robots" content="index, follow">

  <!-- PWA / Android -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Anti-Frango">

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Anti-Frango">

  <!-- Windows / Edge -->
  <meta name="msapplication-TileImage" content="icons/icon-144x144-maskable.png">
  <meta name="msapplication-TileColor" content="#FF6A00">
  <meta name="msapplication-tap-highlight" content="no">

  <!-- Open Graph -->
  <meta property="og:title" content="Anti-Frango - Fitness Store">
  <meta property="og:description" content="A marca de treino feita por atletas comuns">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/icon-512x512.png">

  <title>Anti-Frango 🔥 Fitness Store</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicons & Touch Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-96x96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152-maskable.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192-maskable.png">

  <!-- iOS Splash Screens -->
  <!-- iPhone 14 Pro Max -->
  <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="icons/icon-512x512.png">
  <!-- iPhone 14 / 13 / 12 -->
  <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="icons/icon-512x512.png">
  <!-- iPhone SE -->
  <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="icons/icon-384x384.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash-screen" class="splash-screen">
    <div class="splash-content">
      <img src="icons/icon-512x512.png" alt="Anti-Frango Logo" class="splash-logo">
      <p class="splash-tagline">A marca de treino feita por atletas comuns</p>
      <div class="splash-loader">
        <div class="loader-bar"></div>
      </div>
    </div>
  </div>

  <!-- Main App Container -->
  <div id="app" class="app-container" style="display:none;">

    <!-- Header -->
    <header id="app-header" class="app-header">
      <div class="header-left">
        <button id="menu-btn" class="icon-btn" aria-label="Menu">
          <i class="fas fa-bars"></i>
        </button>
        <img src="icons/icon-512x512.png" alt="Anti-Frango" class="header-logo">
      </div>
      <div class="header-right">
        <button id="search-btn" class="icon-btn" aria-label="Buscar">
          <i class="fas fa-search"></i>
        </button>
        <button id="cart-btn" class="icon-btn cart-icon-btn" aria-label="Carrinho">
          <i class="fas fa-shopping-bag"></i>
          <span id="cart-badge" class="cart-badge" style="display:none;">0</span>
        </button>
      </div>
    </header>

    <!-- Screen Content -->
    <main id="screen-content" class="screen-content">
      <!-- Screens are rendered here dynamically -->
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="bottom-nav">
      <button class="nav-btn active" data-screen="home" aria-label="Home">
        <i class="fas fa-home"></i>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-screen="shop" aria-label="Loja">
        <i class="fas fa-tshirt"></i>
        <span>Loja</span>
      </button>
      <button class="nav-btn nav-btn-center" data-screen="customize" aria-label="Customizar">
        <div class="nav-center-icon">
          <i class="fas fa-paint-brush"></i>
        </div>
        <span>Custom</span>
      </button>
      <button class="nav-btn" data-screen="community" aria-label="Comunidade">
        <i class="fas fa-fire"></i>
        <span>Gang</span>
      </button>
      <button class="nav-btn" data-screen="profile" aria-label="Perfil">
        <i class="fas fa-user"></i>
        <span>Perfil</span>
      </button>
    </nav>

  </div>

  <!-- Toast Notifications Container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Search Modal -->
  <div id="search-modal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
    <div class="search-modal-content">
      <div class="search-input-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Buscar produtos..." autocomplete="off">
        <button id="close-search" class="icon-btn"><i class="fas fa-times"></i></button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <!-- Filter Modal -->
  <div id="filter-modal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
    <div class="filter-modal-content">
      <div class="modal-header">
        <h3>Filtros</h3>
        <button id="close-filter" class="icon-btn"><i class="fas fa-times"></i></button>
      </div>
      <div class="filter-body" id="filter-body">
        <!-- Filter content rendered by JS -->
      </div>
      <div class="filter-footer">
        <button id="clear-filters-btn" class="btn btn-outline">Limpar</button>
        <button id="apply-filters-btn" class="btn btn-primary">Aplicar Filtros</button>
      </div>
    </div>
  </div>

  <!-- Product Detail Modal -->
  <div id="product-modal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
    <div class="product-modal-content">
      <button id="close-product" class="modal-close-btn"><i class="fas fa-times"></i></button>
      <div id="product-detail-content">
        <!-- Product detail rendered by JS -->
      </div>
    </div>
  </div>

  <!-- Cart Drawer -->
  <div id="cart-drawer" class="drawer-overlay" style="display:none;" role="dialog" aria-modal="true">
    <div class="cart-drawer-content">
      <div class="drawer-header">
        <h3><i class="fas fa-shopping-bag"></i> Meu Carrinho</h3>
        <button id="close-cart" class="icon-btn"><i class="fas fa-times"></i></button>
      </div>
      <div id="cart-items-list" class="cart-items-list">
        <!-- Cart items rendered by JS -->
      </div>
      <div class="cart-footer" id="cart-footer">
        <!-- Cart totals rendered by JS -->
      </div>
    </div>
  </div>

  <!-- Side Menu Drawer -->
  <div id="side-menu" class="drawer-overlay" style="display:none;" role="dialog" aria-modal="true">
    <div class="side-menu-content">
      <div class="side-menu-header">
        <img src="icons/icon-512x512.png" alt="Anti-Frango" class="side-menu-logo">
        <button id="close-menu" class="icon-btn"><i class="fas fa-times"></i></button>
      </div>
      <div class="side-menu-user">
        <div class="user-avatar-sm">
          <i class="fas fa-user"></i>
        </div>
        <div>
          <p class="user-menu-name">Atleta Anti-Frango</p>
          <p class="user-menu-level">🔥 Nível: Intermediário</p>
        </div>
      </div>
      <nav class="side-menu-nav">
        <button class="side-nav-item" data-screen="home"><i class="fas fa-home"></i> Home</button>
        <button class="side-nav-item" data-screen="shop"><i class="fas fa-tshirt"></i> Loja</button>
        <button class="side-nav-item" data-screen="customize"><i class="fas fa-paint-brush"></i> Customizar</button>
        <button class="side-nav-item" data-screen="community"><i class="fas fa-fire"></i> Comunidade</button>
        <button class="side-nav-item" data-screen="profile"><i class="fas fa-user"></i> Meu Perfil</button>
        <button class="side-nav-item" data-screen="cart"><i class="fas fa-shopping-bag"></i> Carrinho</button>
        <div class="side-divider"></div>
        <button class="side-nav-item" data-action="admin"><i class="fas fa-cog"></i> Painel Admin</button>
        <button class="side-nav-item" data-action="about"><i class="fas fa-info-circle"></i> Sobre a Marca</button>
      </nav>
      <div class="side-menu-footer">
        <p class="brand-tagline-sm">"A marca de treino feita por atletas comuns"</p>
        <div class="social-links">
          <a href="#" class="social-btn"><i class="fab fa-instagram"></i></a>
          <a href="#" class="social-btn"><i class="fab fa-tiktok"></i></a>
          <a href="#" class="social-btn"><i class="fab fa-youtube"></i></a>
        </div>
      </div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel" class="admin-overlay" style="display:none;" role="dialog" aria-modal="true">
    <div class="admin-content">
      <!-- Admin panel rendered by admin.js -->
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/checkout.js"></script>
  <script src="js/customizer.js"></script>
  <script src="js/screens.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
